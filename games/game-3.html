<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Classic</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #2d5016;
    --ui: #578a34;
    --grid-1: #aad751;
    --grid-2: #a2d149;
    --grid-stripe: rgba(0,0,0,0.04);
    --snake-1: #4674e9;
    --snake-2: #2b5dc7;
    --snake-head: #1e4ba8;
    --food: #e7471d;
    --food-dark: #c63915;
    --combo: #ffd54f;
    --ui-text: #ffffff;
    --over-bg: rgba(20, 50, 10, 0.92);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
  }

  body {
    background: linear-gradient(180deg, var(--ui) 0%, var(--bg-dark) 100%);
    color: var(--ui-text);
    font-family: 'Poppins', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .top-bar {
    width: 100%;
    max-width: 540px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    padding: 0 0.5rem;
  }

  .logo {
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 0.3rem;
  }
  .logo .accent { color: #ffd54f; }
  .logo .snake-emoji {
    display: inline-block;
    animation: wiggle 2s ease-in-out infinite;
  }
  @keyframes wiggle {
    0%, 100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  .top-controls {
    display: flex;
    gap: 0.5rem;
  }

  .icon-btn {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    border: none;
    cursor: pointer;
    font-size: 1.05rem;
    color: var(--ui-text);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.15s;
  }
  .icon-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.25);
  }
  .icon-btn:active:not(:disabled) {
    transform: scale(0.92);
  }
  .icon-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  .scoreboard {
    width: 100%;
    max-width: 540px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.75rem;
    padding: 0.6rem 1rem;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 12px;
    font-size: 0.9rem;
    backdrop-filter: blur(8px);
  }

  .score-item {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    position: relative;
  }

  .score-label {
    opacity: 0.85;
    font-weight: 600;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .score-value {
    font-weight: 800;
    font-size: 1.1rem;
    transition: transform 0.15s, color 0.15s;
  }
  .score-value.bump {
    animation: scoreBump 0.3s ease;
  }
  @keyframes scoreBump {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.3); color: var(--combo); }
  }

  .score-value.high { color: #ffd54f; }

  .combo-badge {
    position: absolute;
    top: -10px;
    right: -28px;
    background: var(--combo);
    color: #2d2d2d;
    font-size: 0.65rem;
    font-weight: 800;
    padding: 1px 6px;
    border-radius: 999px;
    opacity: 0;
    transform: scale(0);
    transition: all 0.25s cubic-bezier(.5,0,.3,1.5);
  }
  .combo-badge.show {
    opacity: 1;
    transform: scale(1);
  }

  .stage {
    position: relative;
    width: 100%;
    max-width: 540px;
    aspect-ratio: 1;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3), 0 0 0 2px rgba(255,255,255,0.05);
  }

  canvas {
    display: block;
    width: 100%;
    height: 100%;
    background: var(--grid-1);
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--over-bg);
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    text-align: center;
    backdrop-filter: blur(4px);
  }
  .overlay.show {
    opacity: 1;
    pointer-events: auto;
  }

  .overlay h2 {
    font-size: clamp(1.5rem, 6vw, 2.2rem);
    font-weight: 800;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
  }

  .overlay .sub {
    font-size: 1rem;
    opacity: 0.85;
    margin-bottom: 1.5rem;
    line-height: 1.5;
  }

  .overlay .badge {
    background: #ffd54f;
    color: #2d2d2d;
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    font-weight: 700;
    font-size: 0.85rem;
    margin-top: 0.5rem;
    display: inline-block;
    animation: badgePop 0.5s cubic-bezier(.5,0,.3,1.5);
  }
  @keyframes badgePop {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .big-btn {
    background: #ffd54f;
    color: #2d2d2d;
    border: none;
    padding: 0.85rem 2rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0, 0, 0, 0.2);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .big-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(0, 0, 0, 0.2); }
  .big-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0, 0, 0, 0.2); }

  .speed-pick {
    display: flex;
    background: rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    margin-top: 0.75rem;
  }
  .speed-pick button {
    background: transparent;
    border: none;
    color: var(--ui-text);
    padding: 0.35rem 0.85rem;
    font-family: inherit;
    font-size: 0.75rem;
    font-weight: 600;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .speed-pick button.active {
    background: rgba(255, 255, 255, 0.3);
  }

  .controls-hint {
    margin-top: 0.75rem;
    font-size: 0.75rem;
    opacity: 0.7;
    text-align: center;
  }

  .dpad {
    display: none;
    position: relative;
    width: 180px;
    height: 180px;
    margin-top: 1rem;
  }

  @media (max-width: 720px), (pointer: coarse) {
    .dpad { display: block; }
    .controls-hint { display: none; }
  }

  .dpad-btn {
    position: absolute;
    width: 60px;
    height: 60px;
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-radius: 12px;
    color: var(--ui-text);
    font-size: 1.3rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.1s, transform 0.1s;
  }
  .dpad-btn:active {
    background: rgba(255, 255, 255, 0.35);
    transform: scale(0.92);
  }
  .dpad-up    { top: 0;    left: 60px; }
  .dpad-down  { bottom: 0; left: 60px; }
  .dpad-left  { top: 60px; left: 0;   }
  .dpad-right { top: 60px; right: 0;  }

  /* ========== OVERLAY EXTRAS ========== */
  .overlay-current {
    margin: 0.4rem 0 0.8rem;
    font-size: 0.85rem;
    opacity: 0.85;
    line-height: 1.4;
    text-align: center;
  }
  .overlay-current b { color: #ffd54f; }
  .overlay-actions {
    margin-top: 0.85rem;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .overlay-mini-btn {
    background: rgba(255, 255, 255, 0.18);
    border: 2px solid rgba(255, 255, 255, 0.35);
    color: #fff;
    padding: 0.4rem 0.85rem;
    border-radius: 999px;
    font-family: inherit;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: background 0.15s, transform 0.15s;
  }
  .overlay-mini-btn:hover { background: rgba(255, 255, 255, 0.3); }
  .overlay-mini-btn:active { transform: scale(0.95); }

  /* ========== PICKER MODAL ========== */
  .picker-modal {
    position: fixed;
    inset: 0;
    background: rgba(10, 25, 5, 0.78);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 0.75rem;
  }
  .picker-modal.show { display: flex; }
  .picker-panel {
    background: #1f3a0e;
    border: 3px solid #6cab38;
    border-radius: 14px;
    width: 100%;
    max-width: 720px;
    height: 100%;
    max-height: 92dvh;
    display: flex;
    flex-direction: column;
    color: #fff;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
  }
  .picker-header {
    padding: 0.85rem 1rem;
    background: #2d5016;
    border-bottom: 2px solid #6cab38;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .picker-header h3 {
    margin: 0;
    font-size: 1.05rem;
    font-weight: 700;
  }
  .picker-tools {
    display: flex;
    gap: 0.4rem;
    align-items: center;
    flex-wrap: wrap;
  }
  .picker-tools input {
    padding: 0.4rem 0.65rem;
    font-family: inherit;
    font-size: 0.8rem;
    border: 2px solid #6cab38;
    border-radius: 6px;
    background: #14260a;
    color: #fff;
    width: 160px;
    outline: none;
  }
  .picker-tools input:focus { border-color: #ffd54f; }
  .picker-close {
    padding: 0.4rem 0.85rem;
    font-family: inherit;
    font-size: 0.78rem;
    background: #ffd54f;
    color: #1f3a0e;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 700;
  }
  .picker-cats {
    padding: 0.55rem 0.85rem;
    background: #142608;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem;
    overflow-x: auto;
  }
  .picker-cat-btn {
    padding: 0.32rem 0.7rem;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    color: #fff;
    font-family: inherit;
    font-size: 0.72rem;
    cursor: pointer;
    white-space: nowrap;
  }
  .picker-cat-btn.active {
    background: #ffd54f;
    color: #1f3a0e;
    border-color: #ffd54f;
    font-weight: 700;
  }
  .picker-grid {
    overflow-y: auto;
    padding: 0.7rem;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 0.55rem;
    flex: 1;
    background: #14260a;
  }
  .mode-grid {
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  }
  .picker-card {
    background: #2d5016;
    border: 2px solid transparent;
    border-radius: 10px;
    padding: 0.55rem;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    text-align: left;
  }
  .picker-card:hover {
    transform: translateY(-2px);
    background: #3a661c;
  }
  .picker-card.selected {
    border-color: #ffd54f;
    background: #3a661c;
    box-shadow: 0 0 0 2px rgba(255, 213, 79, 0.3);
  }
  .picker-card .preview {
    border-radius: 6px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: rgba(0, 0, 0, 0.25);
  }
  .picker-card .preview .seg {
    width: 14px;
    height: 14px;
    border-radius: 4px;
    margin: 0 1px;
    box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.18);
  }
  .picker-card .name {
    font-size: 0.78rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .picker-card .cat {
    font-size: 0.65rem;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .picker-card .desc {
    font-size: 0.72rem;
    opacity: 0.85;
    line-height: 1.35;
  }
  .picker-card .badge-active {
    display: inline-block;
    margin-top: 0.2rem;
    background: #ffd54f;
    color: #1f3a0e;
    font-size: 0.62rem;
    padding: 0.1rem 0.45rem;
    border-radius: 999px;
    font-weight: 800;
    align-self: flex-start;
  }
  .picker-foot {
    padding: 0.5rem 0.95rem;
    font-size: 0.72rem;
    opacity: 0.7;
    text-align: center;
    background: #1a2f0a;
    border-top: 1px solid rgba(255, 255, 255, 0.06);
  }
  @media (max-width: 480px) {
    .picker-tools input { width: 120px; }
    .picker-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
    .mode-grid { grid-template-columns: 1fr; }
    .picker-header h3 { font-size: 0.95rem; }
  }
</style>
</head>

  <div class="top-bar">
    <div class="logo"><span class="snake-emoji">🐍</span>Snake<span class="accent">.</span></div>
    <div class="top-controls">
      <button class="icon-btn" id="skinBtn" aria-label="Ganti skin" title="Ganti skin ular">🎨</button>
      <button class="icon-btn" id="modeBtn" aria-label="Ganti mode" title="Ganti mode permainan">🎯</button>
      <button class="icon-btn" id="soundBtn" aria-label="Suara">🔊</button>
      <button class="icon-btn" id="pauseBtn" aria-label="Jeda" disabled>⏸</button>
    </div>
  </div>

  <div class="scoreboard">
    <div class="score-item">
      <span class="score-label">Skor</span>
      <span class="score-value" id="score">0</span>
      <span class="combo-badge" id="comboBadge"></span>
    </div>
    <div class="score-item">
      <span class="score-label">Apel</span>
      <span class="score-value" id="apples">0</span>
    </div>
    <div class="score-item">
      <span class="score-label">Rekor</span>
      <span class="score-value high" id="best">0</span>
    </div>
  </div>

  <div class="stage">
    <canvas id="game" width="600" height="600" aria-label="Snake game"></canvas>

    <div class="overlay show" id="overlay">
      <h2 id="overlayTitle">Snake Classic</h2>
      <p class="sub" id="overlaySub">Kumpulkan apel sebanyak mungkin.<br>Jangan menabrak dirimu sendiri.</p>
      <div id="overlayCurrent" class="overlay-current"></div>
      <button class="big-btn" id="startBtn">Mulai Bermain</button>
      <div class="speed-pick" id="speedPick">
        <button data-speed="slow">Pelan</button>
        <button data-speed="normal" class="active">Normal</button>
        <button data-speed="fast">Cepat</button>
      </div>
      <div class="overlay-actions">
        <button class="overlay-mini-btn" id="overlaySkinBtn">🎨 Skin</button>
        <button class="overlay-mini-btn" id="overlayModeBtn">🎯 Mode</button>
      </div>
      <p class="controls-hint">Pakai tombol panah, WASD, atau swipe</p>
    </div>
  </div>

  <div class="dpad" id="dpad" aria-hidden="true">
    <button class="dpad-btn dpad-up"    data-dir="up">▲</button>
    <button class="dpad-btn dpad-left"  data-dir="left">◀</button>
    <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    <button class="dpad-btn dpad-down"  data-dir="down">▼</button>
  </div>

  <!-- ============ SKIN PICKER MODAL ============ -->
  <div id="skinModal" class="picker-modal" aria-hidden="true">
    <div class="picker-panel">
      <div class="picker-header">
        <h3>Pilih Skin Ular</h3>
        <div class="picker-tools">
          <input id="skinSearch" type="text" placeholder="Cari skin..." />
          <button class="picker-close" id="skinModalClose">Tutup</button>
        </div>
      </div>
      <div class="picker-cats" id="skinCats"></div>
      <div class="picker-grid" id="skinGrid"></div>
      <div class="picker-foot" id="skinCount"></div>
    </div>
  </div>

  <!-- ============ MODE PICKER MODAL ============ -->
  <div id="modeModal" class="picker-modal" aria-hidden="true">
    <div class="picker-panel">
      <div class="picker-header">
        <h3>Pilih Mode Permainan</h3>
        <div class="picker-tools">
          <input id="modeSearch" type="text" placeholder="Cari mode..." />
          <button class="picker-close" id="modeModalClose">Tutup</button>
        </div>
      </div>
      <div class="picker-grid mode-grid" id="modeGrid"></div>
      <div class="picker-foot" id="modeCount"></div>
    </div>
  </div>

<script src="../assets/gamehub.js"></script>

  // ============= MODES (25) =============
  // Each mode = a set of behavior flags + obstacle layout function (optional)
  function obstaclesPlus(g) {
    const c = Math.floor(g / 2), out = [];
    for (let i = -3; i <= 3; i++) { out.push({x: c+i, y: c}); out.push({x: c, y: c+i}); }
    return out;
  }
  function obstaclesBox(g) {
    const out = [];
    const a = Math.floor(g / 4), b = g - 1 - a;
    for (let i = a; i <= b; i++) { out.push({x:i,y:a}); out.push({x:i,y:b}); out.push({x:a,y:i}); out.push({x:b,y:i}); }
    // Carve open gates
    const cm = Math.floor(g / 2);
    return out.filter(p => !(p.x === cm && (p.y === a || p.y === b)) && !(p.y === cm && (p.x === a || p.x === b)));
  }
  function obstaclesPillars(g) {
    const a = 3, b = g - 1 - a;
    const out = [];
    for (const cx of [a, b]) for (const cy of [a, b]) {
      out.push({x:cx,y:cy}); out.push({x:cx+1,y:cy}); out.push({x:cx,y:cy+1}); out.push({x:cx+1,y:cy+1});
    }
    return out;
  }
  function obstaclesLines(g) {
    const out = [];
    const mid = Math.floor(g / 2);
    for (let i = 2; i <= g - 3; i++) {
      if (i === mid - 1 || i === mid || i === mid + 1) continue;
      out.push({x:i,y:Math.floor(g/3)});
      out.push({x:i,y:Math.floor(g*2/3)});
    }
    return out;
  }
  function obstaclesX(g) {
    const out = [];
    for (let i = 3; i < g - 3; i++) {
      out.push({x:i,y:i});
      out.push({x:i,y:g - 1 - i});
    }
    return out;
  }
  function obstaclesMiniArena(g) {
    // Wall off outer ring to leave smaller play area
    const out = [];
    const margin = 3;
    for (let i = margin; i < g - margin; i++) {
      out.push({x:i, y:margin});
      out.push({x:i, y:g - 1 - margin});
      out.push({x:margin, y:i});
      out.push({x:g - 1 - margin, y:i});
    }
    return out;
  }
  function obstaclesSpiral(g) {
    const out = [];
    const c = Math.floor(g / 2);
    // Simple spiral arms
    for (let r = 1; r <= 5; r++) {
      out.push({x: c + r, y: c});
      out.push({x: c, y: c - r});
      out.push({x: c - r, y: c + (r > 2 ? 1 : 0)});
    }
    return out;
  }

  // ============= SOUND =============
  function ensureAudio() {
    if (!soundOn) return false;
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch(e) { return false; }
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume().catch(() => {});
    }
    return true;
  }

  function playSound(type, opts = {}) {
    if (!ensureAudio()) return;
    const t = audioCtx.currentTime;
    if (type === 'eat') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      const basePitch = 660 + (opts.combo || 0) * 80;
      o.frequency.setValueAtTime(basePitch, t);
      o.frequency.exponentialRampToValueAtTime(basePitch * 1.4, t + 0.08);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.12);
      o.start(t); o.stop(t + 0.13);
    } else if (type === 'die') {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.5);
      g.gain.setValueAtTime(0.18, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.5);
      o.start(t); o.stop(t + 0.52);
    } else if (type === 'combo') {
      // Ascending arpeggio
      [523, 659, 784].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(freq, t + i * 0.05);
        g.gain.setValueAtTime(0.1, t + i * 0.05);
        g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.05 + 0.15);
        o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.16);
      });
    } else if (type === 'golden') {
      // Magical sparkle sound
      [659, 784, 988, 1175, 1397].forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(freq, t + i * 0.06);
        g.gain.setValueAtTime(0.12, t + i * 0.06);
        g.gain.exponentialRampToValueAtTime(0.01, t + i * 0.06 + 0.25);
        o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.26);
      });
    }
  }

  // ============= GAME LOGIC =============
  let gameStartTime = 0;

  function resetState() {
    applyMode();
    const midY = Math.floor(GRID / 2);
    // Find safe starting cells (skip obstacles)
    let startX = 6;
    while (startX < GRID - 3 && (isObstacle(startX, midY) || isObstacle(startX + 1, midY) || isObstacle(startX + 2, midY))) {
      startX++;
    }
    snake = [
      { x: startX, y: midY },
      { x: startX + 1, y: midY },
      { x: startX + 2, y: midY }
    ];
    prevSnake = snake.map(s => ({ ...s }));
    direction = 'right';
    inputQueue = [];
    score = 0;
    apples = 0;
    comboCount = 0;
    lastEatTime = 0;
    willEat = false;
    particles = [];
    floatingTexts = [];
    deathFlash = 0;
    deathTime = 0;
    shakeIntensity = 0;
    shakeTime = 0;
    slowMoUntil = 0;
    food = null;
    goldenFood = null;
    goldenSpawnTime = 0;
    shrinkFood = null;
    shrinkSpawnTime = 0;
    foodList = [];
    extraSpawnedAt = 0;
    gameStartTime = performance.now();
    hideCombo();
    placeFood();
    // Top up foodList for multi-food modes
    const fc = (MODES[currentMode].flags || {}).foodCount || 1;
    while (foodList.length < fc - 1) {
      const extra = pickRandomFreeCell();
      if (!extra) break;
      foodList.push(extra);
    }
    updateUI();
  }

  // Pick a single random free cell (not on snake / food / golden / shrink / obstacles / foodList).
  function pickRandomFreeCell() {
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    if (food) occupied.add(`${food.x},${food.y}`);
    if (goldenFood) occupied.add(`${goldenFood.x},${goldenFood.y}`);
    if (shrinkFood) occupied.add(`${shrinkFood.x},${shrinkFood.y}`);
    for (const fp of foodList) occupied.add(`${fp.x},${fp.y}`);
    for (const ob of staticObstacles) occupied.add(`${ob.x},${ob.y}`);
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!occupied.has(`${x},${y}`)) free.push({ x, y });
      }
    }
    if (free.length === 0) return null;
    return free[Math.floor(Math.random() * free.length)];
  }

  function placeFood() {
    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
    if (food) occupied.add(`${food.x},${food.y}`);
    if (goldenFood) occupied.add(`${goldenFood.x},${goldenFood.y}`);
    if (shrinkFood) occupied.add(`${shrinkFood.x},${shrinkFood.y}`);
    for (const fp of foodList) occupied.add(`${fp.x},${fp.y}`);
    for (const ob of staticObstacles) occupied.add(`${ob.x},${ob.y}`);
    const free = [];
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        if (!occupied.has(`${x},${y}`)) free.push({ x, y });
      }
    }
    if (free.length === 0) {
      food = null;
      return;
    }
    food = free[Math.floor(Math.random() * free.length)];

    // Maybe spawn a golden apple if there isn't one already — chance can be boosted by mode
    const goldenChance = typeof flags.goldenChance === 'number' ? flags.goldenChance : GOLDEN_CHANCE;
    if (!goldenFood && Math.random() < goldenChance && free.length > 1) {
      const occupiedWithFood = new Set(occupied);
      occupiedWithFood.add(`${food.x},${food.y}`);
      const freeForGold = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (!occupiedWithFood.has(`${x},${y}`)) freeForGold.push({ x, y });
        }
      }
      if (freeForGold.length > 0) {
        goldenFood = freeForGold[Math.floor(Math.random() * freeForGold.length)];
        goldenSpawnTime = performance.now();
      }
    }

    // Maybe spawn a shrink apple — only if snake is long enough to benefit
    if (!shrinkFood && snake.length > 8 && Math.random() < SHRINK_CHANCE && free.length > 2) {
      const occupiedAll = new Set(occupied);
      occupiedAll.add(`${food.x},${food.y}`);
      if (goldenFood) occupiedAll.add(`${goldenFood.x},${goldenFood.y}`);
      const freeForShrink = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (!occupiedAll.has(`${x},${y}`)) freeForShrink.push({ x, y });
        }
      }
      if (freeForShrink.length > 0) {
        shrinkFood = freeForShrink[Math.floor(Math.random() * freeForShrink.length)];
        shrinkSpawnTime = performance.now();
      }
    }

    // Top up multi-food list if needed (foodCount mode)
    const fc = flags.foodCount || 1;
    while (foodList.length < fc - 1) {
      const extra = pickRandomFreeCell();
      if (!extra) break;
      foodList.push(extra);
    }
  }

  function isOpposite(d1, d2) {
    return (d1 === 'up' && d2 === 'down') ||
           (d1 === 'down' && d2 === 'up') ||
           (d1 === 'left' && d2 === 'right') ||
           (d1 === 'right' && d2 === 'left');
  }

  function queueDirection(newDir) {
    // Validate so unexpected values can't corrupt direction state
    if (!['up', 'down', 'left', 'right'].includes(newDir)) return;
    if (!running || paused) return;
    // Reverse controls mode: flip the requested direction
    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    if (flags.reverseControls) {
      if (newDir === 'up') newDir = 'down';
      else if (newDir === 'down') newDir = 'up';
      else if (newDir === 'left') newDir = 'right';
      else if (newDir === 'right') newDir = 'left';
    }
    const lastDir = inputQueue.length > 0 ? inputQueue[inputQueue.length - 1] : direction;
    if (newDir === lastDir || isOpposite(newDir, lastDir)) return;
    if (inputQueue.length < 2) inputQueue.push(newDir);
  }

  function tick() {
    // Snapshot snake for interpolation animation
    prevSnake = snake.map(s => ({ ...s }));
    tickStartTime = performance.now();

    // Snapshot direction BEFORE consuming input so we can roll it back on
    // zen-mode wall/obstacle/self collisions (otherwise the snake keeps charging
    // into the wall every tick and looks frozen).
    const directionBefore = direction;
    if (inputQueue.length > 0) direction = inputQueue.shift();

    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    const head = snake[snake.length - 1];
    const newHead = { x: head.x, y: head.y };
    if (direction === 'up') newHead.y--;
    else if (direction === 'down') newHead.y++;
    else if (direction === 'left') newHead.x--;
    else if (direction === 'right') newHead.x++;

    // Wrap-around mode: cross the wall and reappear on opposite side
    if (flags.wrap) {
      if (newHead.x < 0) newHead.x = GRID - 1;
      else if (newHead.x >= GRID) newHead.x = 0;
      if (newHead.y < 0) newHead.y = GRID - 1;
      else if (newHead.y >= GRID) newHead.y = 0;
    } else if (newHead.x < 0 || newHead.x >= GRID || newHead.y < 0 || newHead.y >= GRID) {
      if (flags.zen) {
        // Zen mode: just stop motion at the wall instead of dying. Roll back
        // the direction so the snake doesn't keep hitting the same wall.
        snake = prevSnake.map(s => ({ ...s }));
        direction = directionBefore;
        inputQueue.length = 0;
        return;
      }
      gameOver();
      return;
    }

    // Obstacle collision (treat like a wall)
    if (isObstacle(newHead.x, newHead.y)) {
      if (flags.zen) {
        snake = prevSnake.map(s => ({ ...s }));
        direction = directionBefore;
        inputQueue.length = 0;
        return;
      }
      gameOver();
      return;
    }

    // Check if eating golden / shrink / extra apple
    const willEatGolden = goldenFood && newHead.x === goldenFood.x && newHead.y === goldenFood.y;
    const willEatShrink = shrinkFood && newHead.x === shrinkFood.x && newHead.y === shrinkFood.y;

    let extraFoodIdx = -1;
    for (let i = 0; i < foodList.length; i++) {
      if (foodList[i].x === newHead.x && foodList[i].y === newHead.y) { extraFoodIdx = i; break; }
    }

    willEat = food && newHead.x === food.x && newHead.y === food.y;
    const willEatExtra = extraFoodIdx >= 0;

    // Determine if snake will physically grow this tick
    const willGrow = (willEat || willEatExtra || flags.alwaysGrow) && !flags.noGrow;

    // Self-collision check: if growing, tail stays — check all body. Otherwise exclude tail.
    const bodyToCheck = willGrow ? snake : snake.slice(1);
    for (const seg of bodyToCheck) {
      if (seg.x === newHead.x && seg.y === newHead.y) {
        if (flags.zen) {
          snake = prevSnake.map(s => ({ ...s }));
          direction = directionBefore;
          inputQueue.length = 0;
          return;
        }
        gameOver();
        return;
      }
    }

    snake.push(newHead);

    if (willEat) {
      handleEat(newHead);
      if (flags.noGrow) snake.shift(); // ate but cancel growth
    } else if (willEatExtra) {
      foodList.splice(extraFoodIdx, 1);
      handleEat(newHead);
      if (flags.noGrow) snake.shift();
    } else if (willEatGolden) {
      handleEatGolden(newHead);
      if (!flags.alwaysGrow) snake.shift(); // golden doesn't grow snake
    } else if (willEatShrink) {
      handleEatShrink(newHead);
      if (!flags.alwaysGrow) snake.shift();
    } else if (flags.alwaysGrow) {
      // Just keep growing — no shift
    } else {
      snake.shift();
    }

    // willEat is consumed by drawSnake() to know whether the body is one segment longer.
    // It is true whenever snake.length > prevSnake.length after this tick.
    willEat = snake.length > prevSnake.length;

    updateUI();
  }

  function handleEat(headPos) {
    const now = Date.now();
    if (lastEatTime > 0 && (now - lastEatTime) < COMBO_WINDOW_MS) {
      comboCount++;
    } else {
      comboCount = 1;
    }
    lastEatTime = now;

    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    const scoreMult = flags.scoreMult || 1;
    const basePoints = 10;
    const comboBonus = Math.max(0, comboCount - 1) * COMBO_BONUS;
    const pts = (basePoints + comboBonus) * scoreMult;
    score += pts;
    apples++;

    // Visual effects
    spawnParticles(headPos.x, headPos.y);
    spawnFloatingText(headPos.x, headPos.y, `+${pts}`);
    bumpScore();
    if (comboCount >= 2) {
      showCombo(comboCount);
      playSound('combo');
    }
    placeFood();
    playSound('eat', { combo: comboCount - 1 });
  }

  function handleEatGolden(headPos) {
    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    const scoreMult = flags.scoreMult || 1;
    const pts = GOLDEN_BONUS * scoreMult;
    score += pts;
    goldenFood = null;
    // Visual fanfare
    spawnParticles(headPos.x, headPos.y, '#ffd54f');
    spawnParticles(headPos.x, headPos.y, '#fff176');
    spawnFloatingText(headPos.x, headPos.y, `+${pts}!`, '#ffd54f');
    bumpScore();
    triggerShake(8, 250);
    slowMoUntil = performance.now() + 2500;
    playSound('golden');
  }

  function handleEatShrink(headPos) {
    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    const scoreMult = flags.scoreMult || 1;
    score += SHRINK_BONUS * scoreMult;
    shrinkFood = null;
    // Shrink snake by SHRINK_SEGMENTS, but keep at least 3 segments
    const shrinkBy = Math.min(SHRINK_SEGMENTS, snake.length - 3);
    if (shrinkBy > 0) {
      for (let i = 0; i < shrinkBy; i++) snake.shift();
    }
    spawnParticles(headPos.x, headPos.y, '#80deea');
    spawnParticles(headPos.x, headPos.y, '#b388ff');
    spawnFloatingText(headPos.x, headPos.y, `-${shrinkBy} +${SHRINK_BONUS}`, '#80deea');
    bumpScore();
    playSound('golden');
  }

  function triggerShake(intensity, durationMs) {
    shakeIntensity = intensity;
    shakeDuration = durationMs;
    shakeTime = performance.now() + durationMs;
  }

  let gameOverTimerId = null;
  function gameOver() {
    running = false;
    paused = false;
    pauseBtn.disabled = true;
    if (gameLoopId) {
      clearTimeout(gameLoopId);
      gameLoopId = null;
    }
    playSound('die');

    let newRecord = false;
    if (score > best) {
      best = score;
      newRecord = true;
      saveState();
    }
    updateUI();
    hideCombo();

    // Start death flash animation
    deathFlash = 1;
    deathTime = performance.now();
    triggerShake(12, 400);
    // Clear time-based effects so they don't bleed into death animation
    slowMoUntil = 0;

    // Increment total games stat
    totalGames++;
    totalApples += apples;
    saveState();

    // GameHub: notify so daily challenges (apples / score) and achievements update.
    if (window.GameHub) {
      window.GameHub.notify('g3_gameover', { score, apples, mode: currentMode });
      window.GameHub.notify('game_start', { gameId: 3 });
      // Coin reward: 1 coin per 10 score points
      const coins = Math.floor(score / 10);
      if (coins > 0) window.GameHub.coins.add(coins);
    }

    // Show overlay after death animation
    if (gameOverTimerId) clearTimeout(gameOverTimerId);
    gameOverTimerId = setTimeout(() => {
      gameOverTimerId = null;
      overlayTitle.textContent = newRecord ? 'Rekor Baru! 🎉' : 'Permainan Berakhir';
      const tier = getTier(score);
      let subHtml = `Skor: <b>${score}</b> · ${apples} apel`;
      subHtml += `<br><small style="opacity:0.7">Tingkat: ${tier} · Total: ${totalGames} game · ${totalApples} apel</small>`;
      if (newRecord) subHtml += `<br><span class="badge">⭐ Rekor baru!</span>`;
      overlaySub.innerHTML = subHtml;
      startBtn.textContent = 'Main Lagi';
      overlay.classList.add('show');
    }, 700);
  }

  function getTier(score) {
    if (score >= 300) return '🏆 Master';
    if (score >= 150) return '⭐ Pro';
    if (score >= 50) return '🎯 Reguler';
    return '🌱 Pemula';
  }

  function start() {
    if (gameOverTimerId) { clearTimeout(gameOverTimerId); gameOverTimerId = null; }
    overlay.classList.remove('show');
    resetState();
    running = true;
    paused = false;
    pauseBtn.disabled = false;
    pauseBtn.textContent = '⏸';
    pauseBtn.setAttribute('aria-label', 'Jeda');
    tickStartTime = performance.now();
    scheduleTick();
  }

  // Track the actual delay used for the current tick (may differ from base SPEEDS[speed]
  // due to slow-motion). Render interpolates against this value.
  let currentTickDelay = SPEEDS.normal;

  function scheduleTick() {
    if (!running || paused) return;
    let delay = SPEEDS[speed];
    const flags = (MODES[currentMode] || MODES[0]).flags || {};
    if (typeof flags.speedMult === 'number') {
      delay = Math.round(delay * flags.speedMult);
    }
    if (flags.rampSpeed && gameStartTime > 0) {
      // After 60s, scaled to ~0.5× delay (i.e. 2× speed). Smooth ramp.
      const elapsedSec = (performance.now() - gameStartTime) / 1000;
      const speedUp = Math.min(0.5, elapsedSec / 120); // up to 0.5 reduction
      delay = Math.round(delay * (1 - speedUp));
    }
    // Minimum delay floor to avoid impossible speeds
    if (delay < 35) delay = 35;
    // Slow-motion: tick slower while golden bonus active
    if (slowMoUntil > performance.now()) {
      delay = Math.round(delay * 1.6);
    }
    currentTickDelay = delay;
    gameLoopId = setTimeout(() => {
      gameLoopId = null;
      if (!running || paused) return;
      tick();
      if (running && !paused) scheduleTick();
    }, delay);
  }

  let pauseStartTime = 0;
  function togglePause() {
    if (!running) return;
    paused = !paused;
    if (paused) {
      if (gameLoopId) { clearTimeout(gameLoopId); gameLoopId = null; }
      // Cancel combo hide timer so it doesn't fire during pause
      if (comboHideTimer) { clearTimeout(comboHideTimer); comboHideTimer = null; }
      pauseBtn.textContent = '▶';
      pauseBtn.setAttribute('aria-label', 'Lanjutkan');
      overlayTitle.textContent = 'Jeda';
      overlaySub.textContent = 'Tekan tombol play untuk lanjut';
      startBtn.textContent = 'Lanjutkan';
      overlay.classList.add('show');
      pauseStartTime = performance.now();
    } else {
      pauseBtn.textContent = '⏸';
      pauseBtn.setAttribute('aria-label', 'Jeda');
      overlay.classList.remove('show');
      // Adjust time-based state to compensate for pause duration
      const pauseDuration = performance.now() - pauseStartTime;
      if (goldenSpawnTime > 0) goldenSpawnTime += pauseDuration;
      if (shrinkSpawnTime > 0) shrinkSpawnTime += pauseDuration;
      if (slowMoUntil > 0) slowMoUntil += pauseDuration;
      if (shakeTime > 0) shakeTime += pauseDuration;
      if (gameStartTime > 0) gameStartTime += pauseDuration;
      // lastEatTime uses Date.now() but advances at the same rate as performance.now(),
      // so shifting it forward by pauseDuration restores the original combo window
      if (lastEatTime > 0) lastEatTime += pauseDuration;
      // Restart combo hide timer with remaining time if combo is still valid
      if (comboCount >= 2 && lastEatTime > 0) {
        const elapsed = Date.now() - lastEatTime;
        const remaining = COMBO_WINDOW_MS - elapsed;
        if (remaining > 0) {
          comboBadge.textContent = `×${comboCount}`;
          comboBadge.classList.add('show');
          comboHideTimer = setTimeout(hideCombo, remaining);
        } else {
          hideCombo();
        }
      }
      // Reset interpolation: snake should be at current position, not animate from previous
      prevSnake = snake.map(s => ({ ...s }));
      tickStartTime = performance.now();
      scheduleTick();
    }
  }

  function resumeFromOverlay() {
    if (running && paused) {
      togglePause();
    } else {
      start();
    }
  }

  // ============= VISUAL EFFECTS =============
  function spawnParticles(cellX, cellY, customColor) {
    const cx = cellX * CELL + CELL / 2;
    const cy = cellY * CELL + CELL / 2;
    const count = 12;
    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + (Math.random() - 0.5) * 0.5;
      const speed = 80 + Math.random() * 120;
      let color;
      if (customColor) {
        color = customColor;
      } else {
        color = Math.random() > 0.5 ? '#e7471d' : '#ff8a3d';
      }
      particles.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 0,
        maxLife: 0.5 + Math.random() * 0.3,
        size: 3 + Math.random() * 3,
        color
      });
    }
  }

  function spawnFloatingText(cellX, cellY, text, color) {
    floatingTexts.push({
      x: cellX * CELL + CELL / 2,
      y: cellY * CELL + CELL / 2,
      text,
      color: color || '#ffd54f',
      life: 0,
      maxLife: 1.0
    });
  }

  function bumpScore() {
    scoreEl.classList.remove('bump');
    void scoreEl.offsetWidth; // force reflow
    scoreEl.classList.add('bump');
  }

  let comboHideTimer = null;
  function showCombo(count) {
    comboBadge.textContent = `×${count}`;
    comboBadge.classList.add('show');
    if (comboHideTimer) clearTimeout(comboHideTimer);
    comboHideTimer = setTimeout(hideCombo, COMBO_WINDOW_MS);
  }
  function hideCombo() {
    comboBadge.classList.remove('show');
    if (comboHideTimer) { clearTimeout(comboHideTimer); comboHideTimer = null; }
  }

  // ============= RENDERING =============
  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeOutQuad(t) { return 1 - (1 - t) * (1 - t); }

  // Cache CSS colors at startup to avoid recomputing every frame
  const COLORS = (() => {
    const s = getComputedStyle(document.documentElement);
    return {
      grid1: s.getPropertyValue('--grid-1').trim(),
      grid2: s.getPropertyValue('--grid-2').trim(),
      snakeHead: s.getPropertyValue('--snake-head').trim(),
      snakeBody: s.getPropertyValue('--snake-1').trim(),
      snakeTail: s.getPropertyValue('--snake-2').trim()
    };
  })();
  // Apply selected skin → update snake colors and invalidate gradient cache
  function applySkin() {
    const skin = SKINS[currentSkin] || SKINS[0];
    COLORS.snakeHead = skin.head;
    COLORS.snakeBody = skin.body;
    COLORS.snakeTail = skin.tail;
    bodyGradientCache = [];   // invalidate so getBodyColor recomputes
    lastSnakeLen = 0;
  }

  // Apply selected mode → compute static obstacle cells; consumed by tick() and placeFood().
  // Speed-multiplier flags are read live by scheduleTick(); ramp-speed reads gameStartTime.
  function applyMode() {
    const mode = MODES[currentMode] || MODES[0];
    const f = mode.flags || {};
    if (typeof f.obstacles === 'function') {
      try {
        staticObstacles = f.obstacles(GRID) || [];
      } catch (e) {
        staticObstacles = [];
      }
    } else {
      staticObstacles = [];
    }
  }

  // True if a cell coincides with an obstacle wall.
  function isObstacle(x, y) {
    for (let i = 0; i < staticObstacles.length; i++) {
      if (staticObstacles[i].x === x && staticObstacles[i].y === y) return true;
    }
    return false;
  }

  // Pre-compute color gradient for snake body (recomputed when snake length changes)
  let bodyGradientCache = [];
  let lastSnakeLen = 0;
  function getBodyColor(i, length) {
    if (length !== lastSnakeLen) {
      bodyGradientCache = [];
      lastSnakeLen = length;
      const p1 = parseHex(COLORS.snakeTail);
      const p2 = parseHex(COLORS.snakeBody);
      for (let k = 0; k < length; k++) {
        const ratio = length > 1 ? k / (length - 1) : 0;
        if (!p1 || !p2) {
          bodyGradientCache.push(COLORS.snakeBody);
        } else {
          const r = Math.round(lerp(p1.r, p2.r, ratio));
          const g = Math.round(lerp(p1.g, p2.g, ratio));
          const b = Math.round(lerp(p1.b, p2.b, ratio));
          bodyGradientCache.push(`rgb(${r},${g},${b})`);
        }
      }
    }
    return bodyGradientCache[i];
  }

  function render() {
    const now = performance.now();
    // Use the actual delay of the current in-progress tick (may include slow-mo)
    const tickDelay = currentTickDelay;
    // Interpolation progress [0..1]: 0 at tick start, 1 at next tick
    let progress = running && !paused ? (now - tickStartTime) / tickDelay : 1;
    progress = Math.max(0, Math.min(1, progress));
    const eased = progress; // linear feels best for snake

    // ---- Camera shake ----
    ctx.save();
    if (shakeTime > now) {
      const remaining = (shakeTime - now) / shakeDuration;
      const shakeAmt = shakeIntensity * remaining;
      const sx = (Math.random() - 0.5) * shakeAmt;
      const sy = (Math.random() - 0.5) * shakeAmt;
      ctx.translate(sx, sy);
    } else {
      shakeIntensity = 0;
    }

    // ---- Background ----
    for (let y = 0; y < GRID; y++) {
      for (let x = 0; x < GRID; x++) {
        ctx.fillStyle = ((x + y) % 2 === 0) ? COLORS.grid1 : COLORS.grid2;
        ctx.fillRect(x * CELL, y * CELL, CELL, CELL);
      }
    }

    // ---- Obstacles (walls) ----
    if (staticObstacles.length > 0) {
      for (const ob of staticObstacles) {
        const ox = ob.x * CELL;
        const oy = ob.y * CELL;
        // Dark stone block with subtle highlight
        ctx.fillStyle = '#3a2a1a';
        ctx.fillRect(ox + 1, oy + 1, CELL - 2, CELL - 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.fillRect(ox + 2, oy + 2, CELL - 4, 3);
        ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.fillRect(ox + 2, oy + CELL - 5, CELL - 4, 3);
      }
    }

    // ---- Extra foods (multi-food modes) ----
    if (foodList.length > 0) {
      for (const ef of foodList) {
        const cx = ef.x * CELL + CELL / 2;
        const cy = ef.y * CELL + CELL / 2;
        const pulse = 1 + Math.sin(foodPulsePhase) * 0.06;
        const r = CELL * 0.36 * pulse;
        ctx.shadowColor = 'rgba(231, 71, 29, 0.55)';
        ctx.shadowBlur = 10;
        const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
        grd.addColorStop(0, '#ff6b3d');
        grd.addColorStop(1, '#c63915');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = 'rgba(255, 255, 255, 0.45)';
        ctx.beginPath();
        ctx.arc(cx - r * 0.3, cy - r * 0.3, r * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ---- Food (pulsing apple) ----
    foodPulsePhase += 0.08;
    if (food) {
      const cx = food.x * CELL + CELL / 2;
      const cy = food.y * CELL + CELL / 2;
      const pulse = 1 + Math.sin(foodPulsePhase) * 0.06;
      const r = CELL * 0.38 * pulse;

      ctx.shadowColor = 'rgba(231, 71, 29, 0.6)';
      ctx.shadowBlur = 12;
      const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
      grd.addColorStop(0, '#ff6b3d');
      grd.addColorStop(1, '#c63915');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
      ctx.beginPath();
      ctx.arc(cx - r * 0.3, cy - r * 0.3, r * 0.22, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = '#5a4032';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - r);
      ctx.lineTo(cx, cy - r - 4);
      ctx.stroke();

      // Tiny leaf
      ctx.fillStyle = '#7cb342';
      ctx.beginPath();
      ctx.ellipse(cx + 3, cy - r - 2, 3, 1.5, -Math.PI / 4, 0, Math.PI * 2);
      ctx.fill();
    }

    // ---- Golden apple ----
    if (goldenFood) {
      const elapsed = now - goldenSpawnTime;
      // Don't expire during pause (state will be adjusted on resume)
      if (elapsed > GOLDEN_LIFETIME_MS && !paused) {
        goldenFood = null;
      } else {
        const lifeRatio = elapsed / GOLDEN_LIFETIME_MS;
        // Blink in last ~2 seconds (>71% of lifetime)
        const blinkVisible = lifeRatio < 0.71 || Math.floor(elapsed / 200) % 2 === 0;
        if (blinkVisible) {
          const cx = goldenFood.x * CELL + CELL / 2;
          const cy = goldenFood.y * CELL + CELL / 2;
          const goldPulse = 1 + Math.sin(foodPulsePhase * 1.3) * 0.12;
          const r = CELL * 0.4 * goldPulse;

          // Outer glow
          ctx.shadowColor = 'rgba(255, 213, 79, 0.9)';
          ctx.shadowBlur = 20;
          const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
          grd.addColorStop(0, '#fff59d');
          grd.addColorStop(0.5, '#ffd54f');
          grd.addColorStop(1, '#f9a825');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;

          // Highlight
          ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.beginPath();
          ctx.arc(cx - r * 0.3, cy - r * 0.3, r * 0.25, 0, Math.PI * 2);
          ctx.fill();

          // Star sparkle
          ctx.fillStyle = '#ffffff';
          const sparkleSize = 2 + Math.sin(foodPulsePhase * 2) * 1;
          ctx.fillRect(cx + r * 0.4, cy - r * 0.4 - sparkleSize / 2, sparkleSize, sparkleSize);
        }
      }
    }

    // ---- Shrink apple (cyan/purple, smaller) ----
    if (shrinkFood) {
      const elapsed = now - shrinkSpawnTime;
      if (elapsed > SHRINK_LIFETIME_MS && !paused) {
        shrinkFood = null;
      } else {
        const lifeRatio = elapsed / SHRINK_LIFETIME_MS;
        const blinkVisible = lifeRatio < 0.7 || Math.floor(elapsed / 200) % 2 === 0;
        if (blinkVisible) {
          const cx = shrinkFood.x * CELL + CELL / 2;
          const cy = shrinkFood.y * CELL + CELL / 2;
          const pulse = 1 + Math.sin(foodPulsePhase * 1.5) * 0.1;
          const r = CELL * 0.35 * pulse;
          ctx.shadowColor = 'rgba(179,136,255,0.7)';
          ctx.shadowBlur = 14;
          const grd = ctx.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.1, cx, cy, r);
          grd.addColorStop(0, '#e1bee7');
          grd.addColorStop(0.5, '#b388ff');
          grd.addColorStop(1, '#7c4dff');
          ctx.fillStyle = grd;
          ctx.beginPath();
          ctx.arc(cx, cy, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
          // Down arrow inside (indicates shrink)
          ctx.fillStyle = 'rgba(255,255,255,0.85)';
          ctx.font = 'bold ' + Math.floor(CELL * 0.45) + 'px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText('▼', cx, cy);
        }
      }
    }

    // ---- Snake (interpolated) ----
    drawSnake(eased);

    // ---- Particles ----
    drawParticles(now);

    // ---- Floating texts ----
    drawFloatingTexts(now);

    ctx.restore(); // end camera shake — full-screen overlays below are NOT shaken

    // ---- Death flash overlay (no shake) ----
    if (deathFlash > 0) {
      const elapsed = (now - deathTime) / 1000;
      const flashAlpha = Math.max(0, 0.5 - elapsed * 0.7);
      if (flashAlpha > 0) {
        ctx.fillStyle = `rgba(255, 0, 0, ${flashAlpha})`;
        ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      } else {
        deathFlash = 0;
      }
    }

    // ---- Slow-mo vignette (no shake) ----
    if (slowMoUntil > now) {
      const remaining = Math.min(1, (slowMoUntil - now) / 2500);
      const grd = ctx.createRadialGradient(
        CANVAS_SIZE / 2, CANVAS_SIZE / 2, CANVAS_SIZE * 0.3,
        CANVAS_SIZE / 2, CANVAS_SIZE / 2, CANVAS_SIZE * 0.7
      );
      grd.addColorStop(0, 'rgba(255, 213, 79, 0)');
      grd.addColorStop(1, `rgba(255, 213, 79, ${0.15 * remaining})`);
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
    }
  }

  // Draw snake with smooth interpolation between prevSnake and current snake.
  function drawSnake(t) {
    if (snake.length === 0) return;

    // Compute interpolated positions for each segment.
    // Logic: each segment at time t moves from its position at tick start to its new position.
    // If !willEat: prevSnake[i] is approximately equivalent to snake[i] (after shift).
    //   The new head appeared (snake[snake.length-1]). Old tail (prevSnake[0]) disappeared.
    //   For segment i in snake: its previous position is prevSnake[i] if !willEat (because shift removed prevSnake[0]).
    // If willEat: snake.length = prevSnake.length + 1. New head appeared, no tail removed.
    //   For segment i in snake: if i < prevSnake.length, prev = prevSnake[i]. New head (i=snake.length-1) prev = head before tick.

    const positions = [];
    const sLen = snake.length;
    const pLen = prevSnake.length;

    for (let i = 0; i < sLen; i++) {
      const seg = snake[i];
      let prev;
      if (willEat) {
        // Snake grew: snake[0..pLen-1] === prevSnake[0..pLen-1] (body unchanged).
        // snake[pLen] is the new head, which emerged from old head position.
        if (i < pLen) prev = prevSnake[i];
        else prev = prevSnake[pLen - 1];
      } else {
        // No grow: lerp index-by-index. snake.length === prevSnake.length here.
        // This makes the whole snake "flow forward" by one cell smoothly.
        prev = prevSnake[i];
      }
      positions.push({
        x: lerp(prev.x, seg.x, t),
        y: lerp(prev.y, seg.y, t)
      });
    }

    // Use cached colors for performance
    for (let i = 0; i < positions.length; i++) {
      const pos = positions[i];
      const isHead = i === positions.length - 1;

      let color;
      if (isHead) color = COLORS.snakeHead;
      else color = getBodyColor(i, positions.length);
      ctx.fillStyle = color;

      // Draw segment with rounded corners — connect to neighbors smoothly
      const x = pos.x * CELL + 1;
      const y = pos.y * CELL + 1;
      const w = CELL - 2;
      const h = CELL - 2;
      drawRoundedRect(x, y, w, h, isHead ? 7 : 5);
    }

    // Eye on head
    if (positions.length > 0) {
      const head = positions[positions.length - 1];
      const hx = head.x * CELL + CELL / 2;
      const hy = head.y * CELL + CELL / 2;
      const offset = CELL * 0.18;
      let ex1, ey1, ex2, ey2;
      if (direction === 'right') {
        ex1 = hx + offset; ey1 = hy - offset;
        ex2 = hx + offset; ey2 = hy + offset;
      } else if (direction === 'left') {
        ex1 = hx - offset; ey1 = hy - offset;
        ex2 = hx - offset; ey2 = hy + offset;
      } else if (direction === 'up') {
        ex1 = hx - offset; ey1 = hy - offset;
        ex2 = hx + offset; ey2 = hy - offset;
      } else {
        ex1 = hx - offset; ey1 = hy + offset;
        ex2 = hx + offset; ey2 = hy + offset;
      }
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.arc(ex1, ey1, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 3.5, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'black';
      ctx.beginPath(); ctx.arc(ex1, ey1, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex2, ey2, 1.8, 0, Math.PI * 2); ctx.fill();
    }
  }

  function parseHex(c) {
    c = c.trim();
    if (c.length === 7 && c[0] === '#') {
      return {
        r: parseInt(c.slice(1, 3), 16),
        g: parseInt(c.slice(3, 5), 16),
        b: parseInt(c.slice(5, 7), 16)
      };
    }
    return null;
  }

  function drawRoundedRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    ctx.fill();
  }

  let lastRenderTime = 0;
  function drawParticles(now) {
    let dt = lastRenderTime > 0 ? (now - lastRenderTime) / 1000 : 0;
    // Clamp dt to prevent huge jumps (e.g., after tab regains focus)
    if (dt > 0.1) dt = 0.1;
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.life += dt;
      if (p.life >= p.maxLife) {
        particles.splice(i, 1);
        continue;
      }
      // Update physics
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 200 * dt; // gravity
      p.vx *= 0.96;     // friction
      // Draw
      const alpha = 1 - (p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (1 - p.life / p.maxLife * 0.5), 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }

  function drawFloatingTexts(now) {
    let dt = lastRenderTime > 0 ? (now - lastRenderTime) / 1000 : 0;
    if (dt > 0.1) dt = 0.1;
    for (let i = floatingTexts.length - 1; i >= 0; i--) {
      const f = floatingTexts[i];
      f.life += dt;
      if (f.life >= f.maxLife) {
        floatingTexts.splice(i, 1);
        continue;
      }
      const progress = f.life / f.maxLife;
      const alpha = 1 - progress;
      const yOffset = -40 * easeOutQuad(progress);

      ctx.font = 'bold 22px Poppins, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.lineWidth = 3;
      ctx.strokeStyle = `rgba(0, 0, 0, ${alpha * 0.5})`;
      // Parse the rgb/hex color and apply alpha
      ctx.fillStyle = colorWithAlpha(f.color, alpha);
      ctx.strokeText(f.text, f.x, f.y + yOffset);
      ctx.fillText(f.text, f.x, f.y + yOffset);
    }
    lastRenderTime = now;
  }

  function colorWithAlpha(color, alpha) {
    // Accept hex or rgb()
    if (color.startsWith('#')) {
      const p = parseHex(color);
      if (p) return `rgba(${p.r},${p.g},${p.b},${alpha})`;
    }
    // Fallback: assume it's already valid
    return color;
  }

  // Main animation loop — runs continuously for smooth animation
  function animLoop() {
    render();
    animationFrameId = requestAnimationFrame(animLoop);
  }

  function updateUI() {
    scoreEl.textContent = score;
    applesEl.textContent = apples;
    bestEl.textContent = best;
  }

  // ============= INPUT =============
  const keyMap = {
    'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right',
    'w': 'up', 'W': 'up', 's': 'down', 'S': 'down',
    'a': 'left', 'A': 'left', 'd': 'right', 'D': 'right'
  };

  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input, textarea')) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;

    // If a button is focused and user pressed Enter/Space, let browser activate the button.
    // For arrow keys / WASD, always handle for snake control.
    const isButtonFocused = e.target.tagName === 'BUTTON';
    const isActivationKey = e.key === 'Enter' || e.key === ' ';
    if (isButtonFocused && isActivationKey) return;

    if (keyMap[e.key]) {
      e.preventDefault();
      queueDirection(keyMap[e.key]);
    } else if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
      e.preventDefault();
      if (running) togglePause();
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (overlay.classList.contains('show')) resumeFromOverlay();
    }
  });

  dpad.addEventListener('click', (e) => {
    const btn = e.target.closest('.dpad-btn');
    if (!btn) return;
    queueDirection(btn.dataset.dir);
  });

  let touchStart = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) return;
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY, time: Date.now() };
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!touchStart) return;
    const touch = e.changedTouches && e.changedTouches[0];
    if (!touch) { touchStart = null; return; }
    const dx = touch.clientX - touchStart.x;
    const dy = touch.clientY - touchStart.y;
    const dt = Date.now() - touchStart.time;
    touchStart = null;

    const minDist = 20;
    if (Math.abs(dx) < minDist && Math.abs(dy) < minDist) {
      if (running && dt < 300) togglePause();
      return;
    }

    if (Math.abs(dx) > Math.abs(dy)) {
      queueDirection(dx > 0 ? 'right' : 'left');
    } else {
      queueDirection(dy > 0 ? 'down' : 'up');
    }
  });

  canvas.addEventListener('touchcancel', () => { touchStart = null; });

  // ============= BUTTON EVENTS =============
  startBtn.addEventListener('click', resumeFromOverlay);
  pauseBtn.addEventListener('click', togglePause);

  function updateSoundButton() {
    soundBtn.textContent = soundOn ? '🔊' : '🔇';
    soundBtn.setAttribute('aria-label', soundOn ? 'Matikan suara' : 'Nyalakan suara');
    soundBtn.setAttribute('aria-pressed', String(soundOn));
  }

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    updateSoundButton();
    saveState();
    if (soundOn) ensureAudio();
  });

  speedPick.addEventListener('click', (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    const newSpeed = e.target.dataset.speed;
    if (!SPEEDS[newSpeed]) return;
    speed = newSpeed;
    document.querySelectorAll('#speedPick button').forEach(b => {
      b.classList.toggle('active', b.dataset.speed === speed);
    });
    saveState();
  });

  document.addEventListener('visibilitychange', () => {
    if (document.hidden && running && !paused) {
      togglePause();
    }
  });

  // ============= SKIN / MODE PICKERS =============
  const skinModal      = document.getElementById('skinModal');
  const skinGrid       = document.getElementById('skinGrid');
  const skinCats       = document.getElementById('skinCats');
  const skinSearch     = document.getElementById('skinSearch');
  const skinCountEl    = document.getElementById('skinCount');
  const skinBtn        = document.getElementById('skinBtn');
  const overlaySkinBtn = document.getElementById('overlaySkinBtn');
  const skinModalClose = document.getElementById('skinModalClose');

  const modeModal      = document.getElementById('modeModal');
  const modeGrid       = document.getElementById('modeGrid');
  const modeSearch     = document.getElementById('modeSearch');
  const modeCountEl    = document.getElementById('modeCount');
  const modeBtn        = document.getElementById('modeBtn');
  const overlayModeBtn = document.getElementById('overlayModeBtn');
  const modeModalClose = document.getElementById('modeModalClose');
  const overlayCurrent = document.getElementById('overlayCurrent');

  let skinCatFilter = 'Semua';

  function updateOverlayCurrent() {
    if (!overlayCurrent) return;
    const sk = SKINS[currentSkin] || SKINS[0];
    const md = MODES[currentMode] || MODES[0];
    overlayCurrent.innerHTML =
      `Skin: <b>${escapeHtml(sk.name)}</b> &nbsp;·&nbsp; Mode: <b>${escapeHtml(md.name)}</b>`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    })[c]);
  }

  function renderSkinCats() {
    const cats = ['Semua'];
    for (const s of SKINS) if (!cats.includes(s.cat)) cats.push(s.cat);
    skinCats.innerHTML = '';
    for (const c of cats) {
      const b = document.createElement('button');
      b.className = 'picker-cat-btn' + (c === skinCatFilter ? ' active' : '');
      b.textContent = c;
      b.addEventListener('click', () => {
        skinCatFilter = c;
        renderSkinCats();
        renderSkinGrid();
      });
      skinCats.appendChild(b);
    }
  }

  function renderSkinGrid() {
    const q = (skinSearch.value || '').trim().toLowerCase();
    skinGrid.innerHTML = '';
    let shown = 0;
    SKINS.forEach((sk, i) => {
      if (skinCatFilter !== 'Semua' && sk.cat !== skinCatFilter) return;
      if (q && !(sk.name.toLowerCase().includes(q) || sk.cat.toLowerCase().includes(q))) return;
      shown++;
      const card = document.createElement('div');
      card.className = 'picker-card' + (i === currentSkin ? ' selected' : '');
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.innerHTML = `
        <div class="preview">
          <div class="seg" style="background:${sk.tail}"></div>
          <div class="seg" style="background:${sk.body}"></div>
          <div class="seg" style="background:${sk.head};box-shadow:inset 0 -2px 0 rgba(0,0,0,0.18),0 0 0 2px rgba(255,255,255,0.25)"></div>
        </div>
        <div class="name">${escapeHtml(sk.name)}</div>
        <div class="cat">${escapeHtml(sk.cat)}</div>
        ${i === currentSkin ? '<span class="badge-active">Aktif</span>' : ''}
      `;
      const choose = () => {
        currentSkin = i;
        applySkin();
        saveState();
        renderSkinGrid();
        updateOverlayCurrent();
      };
      card.addEventListener('click', choose);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); }
      });
      skinGrid.appendChild(card);
    });
    skinCountEl.textContent = `Menampilkan ${shown} dari ${SKINS.length} skin`;
  }

  function renderModeGrid() {
    const q = (modeSearch.value || '').trim().toLowerCase();
    modeGrid.innerHTML = '';
    let shown = 0;
    MODES.forEach((m, i) => {
      if (q && !(m.name.toLowerCase().includes(q) || (m.desc || '').toLowerCase().includes(q))) return;
      shown++;
      const card = document.createElement('div');
      card.className = 'picker-card' + (i === currentMode ? ' selected' : '');
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      const hint = (running && i !== currentMode) ? '<div class="cat" style="color:#ffd54f">Akan aktif setelah game over</div>' : '';
      card.innerHTML = `
        <div class="name">${escapeHtml(m.name)}</div>
        <div class="desc">${escapeHtml(m.desc || '')}</div>
        ${hint}
        ${i === currentMode ? '<span class="badge-active">Aktif</span>' : ''}
      `;
      const choose = () => {
        // Clicking the already-active mode is a no-op (don't reset snake/board).
        if (currentMode === i) return;
        currentMode = i;
        saveState();
        if (!running) {
          // Safe to apply immediately and respawn snake
          applyMode();
          resetState();
        }
        // If running, mode change is deferred — applies on next resetState() (next game start)
        renderModeGrid();
        updateOverlayCurrent();
      };
      card.addEventListener('click', choose);
      card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); choose(); }
      });
      modeGrid.appendChild(card);
    });
    modeCountEl.textContent = `Menampilkan ${shown} dari ${MODES.length} mode`;
  }

  function openSkinModal() {
    skinSearch.value = '';
    skinCatFilter = 'Semua';
    renderSkinCats();
    renderSkinGrid();
    skinModal.classList.add('show');
    skinModal.setAttribute('aria-hidden', 'false');
  }
  function closeSkinModal() {
    skinModal.classList.remove('show');
    skinModal.setAttribute('aria-hidden', 'true');
  }
  function openModeModal() {
    modeSearch.value = '';
    renderModeGrid();
    modeModal.classList.add('show');
    modeModal.setAttribute('aria-hidden', 'false');
  }
  function closeModeModal() {
    modeModal.classList.remove('show');
    modeModal.setAttribute('aria-hidden', 'true');
  }

  skinBtn.addEventListener('click', openSkinModal);
  overlaySkinBtn.addEventListener('click', openSkinModal);
  skinModalClose.addEventListener('click', closeSkinModal);
  skinModal.addEventListener('click', (e) => { if (e.target === skinModal) closeSkinModal(); });
  skinSearch.addEventListener('input', renderSkinGrid);

  modeBtn.addEventListener('click', openModeModal);
  overlayModeBtn.addEventListener('click', openModeModal);
  modeModalClose.addEventListener('click', closeModeModal);
  modeModal.addEventListener('click', (e) => { if (e.target === modeModal) closeModeModal(); });
  modeSearch.addEventListener('input', renderModeGrid);

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (skinModal.classList.contains('show')) closeSkinModal();
      if (modeModal.classList.contains('show')) closeModeModal();
    }
  });

  // ============= INIT =============
  loadState();
  updateSoundButton();
  document.querySelectorAll('#speedPick button').forEach(b => {
    b.classList.toggle('active', b.dataset.speed === speed);
  });
  applySkin();
  applyMode();
  resetState();
  updateOverlayCurrent();
  animLoop(); // start render loop immediately
})();
</script>
</body>
</html>
